services:
  postgres:
    image: postgres:16-alpine
    container_name: stack_overflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stack_overflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stack_overflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
